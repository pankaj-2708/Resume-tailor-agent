<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Resume Tailor</h1>

    <div class="field-group">
      <label for="jd">Job Description</label>
      <textarea id="jd" placeholder="Paste the job description here..."></textarea>
    </div>

    <div class="field-group">
      <label for="resume">Resume LaTeX</label>
      <textarea id="resume" placeholder="Enter your resume's .tex file path here">C:\\Downloads\\main.tex
      </textarea>
    </div>

    <div class="field-group">
      <label for="resumeName">New Resume Name</label>
      <input type="text" id="resumeName" value="resume" placeholder="e.g. tailored_resume">
    </div>

    <button id="tailorBtn">Tailor Resume</button>

    <div id="runningJobs" class="running-jobs-container hidden">
      <h3 class="section-title">Running Jobs</h3>
      <ul id="jobsList"></ul>
    </div>

    <div id="completedJobs" class="completed-jobs-container hidden">
      <h3 class="section-title">Last 10 Completed Jobs</h3>
      <ul id="completedList"></ul>
    </div>

    <div id="status" class="status-container hidden"></div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
